name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 */12 * * *"   # Every 12 hours — 00:00 and 12:00 UTC
  workflow_dispatch:           # Manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase REST API
        run: |
          echo "🏓 Pinging Supabase project ajozkyhcfuagjrgzpxyj..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://ajozkyhcfuagjrgzpxyj.supabase.co/rest/v1/site_settings?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "📡 HTTP Status: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Supabase is alive and responding."
          else
            echo "❌ Unexpected response: $RESPONSE"
            exit 1
          fi

      - name: Ping Supabase Auth endpoint
        run: |
          echo "🔑 Pinging Supabase Auth..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://ajozkyhcfuagjrgzpxyj.supabase.co/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "📡 Auth HTTP Status: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Supabase Auth is alive."
          else
            echo "⚠️  Auth endpoint returned: $RESPONSE (non-critical)"
          fi

      - name: Ping Supabase Storage endpoint
        run: |
          echo "🗄️  Pinging Supabase Storage..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://ajozkyhcfuagjrgzpxyj.supabase.co/storage/v1/bucket" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "📡 Storage HTTP Status: $RESPONSE"

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "400" ]; then
            echo "✅ Supabase Storage is alive."
          else
            echo "⚠️  Storage endpoint returned: $RESPONSE (non-critical)"
          fi

      - name: Summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🏓 TAMx Supabase Ping Complete"
          echo "  Project : ajozkyhcfuagjrgzpxyj"
          echo "  Time    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Next run: in 12 hours"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
